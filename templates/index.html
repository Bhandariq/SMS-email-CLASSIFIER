<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spam Detector AI</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg"></div>

<nav>
  <h2>⚡ Spam Detector</h2>
  <button id="themeToggle">🌙</button>
</nav>

<div class="app">

  <!-- CHAT AREA -->
  <div id="chat" class="chat"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <textarea id="msg" placeholder="Type your message..."></textarea>
    <button id="send">Send</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div>Total: <span id="total">0</span></div>
    <div>Spam: <span id="spam">0</span></div>
    <div>Safe: <span id="ham">0</span></div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const btn = document.getElementById("send");
const input = document.getElementById("msg");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

btn.onclick = async () => {
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  const loader = document.createElement("div");
  loader.className = "msg bot loading";
  loader.innerText = "Analyzing...";
  chat.appendChild(loader);

  const res = await fetch("/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  const data = await res.json();
  loader.remove();

  addMessage(data.pretty, "bot");

  document.getElementById("total").innerText = data.stats.total;
  document.getElementById("spam").innerText = data.stats.spam;
  document.getElementById("ham").innerText = data.stats.ham;
};

// theme toggle
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("light");
};
</script>

</body>
</html>
